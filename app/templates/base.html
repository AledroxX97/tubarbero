<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Barbería{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/style.css">
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.png">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand" href="/">
            <div class="logo-icon"><i class="bi bi-scissors"></i></div>
            TuBarbero
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end gap-3" id="navMenu">
            {% if usuario %}
            <div class="d-flex align-items-center gap-3">
                <span class="text-dark">{{ usuario.nombre }}</span>
                <a href="/auth/logout" class="btn btn-dark-custom">Cerrar sesión</a>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="container py-4 ">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

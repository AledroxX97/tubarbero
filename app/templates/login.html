{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}



<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">✂️ Iniciar Sesión</h4>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST" action="/auth/login">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Entrar</button>
                </form>
                <hr>
                <p class="text-center mb-0">¿No tienes cuenta?
                    <a href="/auth/registro">Regístrate</a>
                </p>
            </div>
        </div>
    </div>
</div>
<footer class="py-4 fixed-bottom">
        <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div class="d-flex align-items-center gap-2">
                <div class="logo-icon"><i class="bi bi-scissors text-white"></i></div>
                <span class="fw-semibold">TuBarbero</span>
            </div>
            <p class="text-muted small mb-0">© 2026 tuBarbero. Todos los derechos reservados.</p>
            <div class="d-flex gap-3">
                <a href="#" class="text-muted small text-decoration-none">Privacidad</a>
                <a href="#" class="text-muted small text-decoration-none">Términos</a>
                <a href="#funciones" class="text-muted small text-decoration-none">Funciones</a>
            </div>
        </div>
    </footer>
{% endblock %}
